<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1510">
<title>Slovíčka</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    background: linear-gradient(160deg, #1a1510 0%, #231d14 50%, #1a1510 100%);
    min-height: 100vh;
    font-family: Georgia, 'Times New Roman', serif;
    color: #e8d5b0;
    display: flex;
    justify-content: center;
  }
  #app {
    width: 100%;
    max-width: 420px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    position: relative;
  }
  .screen { display: none; flex-direction: column; flex: 1; padding-bottom: 40px; overflow-y: auto; }
  .screen.active { display: flex; }

  /* Header */
  .header { padding: 40px 24px 20px; border-bottom: 1px solid rgba(244,201,122,0.15); margin-bottom: 8px; }
  .day-badge {
    display: inline-block;
    background: rgba(244,201,122,0.15);
    border: 1px solid rgba(244,201,122,0.3);
    color: #f4c97a;
    font-size: 11px;
    letter-spacing: 3px;
    padding: 3px 10px;
    border-radius: 20px;
    margin-bottom: 8px;
  }
  .title { color: #e8d5b0; font-size: 32px; font-weight: normal; letter-spacing: 1px; }
  .subtitle { color: #7a6a50; font-size: 14px; margin-top: 4px; }

  /* Review banner */
  .review-banner {
    margin: 8px 20px;
    padding: 12px 16px;
    background: rgba(244,201,122,0.08);
    border: 1px solid rgba(244,201,122,0.25);
    border-radius: 12px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 14px;
  }

  /* Section */
  .section { padding: 16px 20px 4px; }
  .section-label { color: #5a4a30; font-size: 11px; letter-spacing: 3px; margin-bottom: 10px; }

  /* Mode buttons */
  .mode-btn {
    width: 100%;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 14px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 8px;
    cursor: pointer;
    color: #e8d5b0;
    text-align: left;
    font-family: Georgia, serif;
    transition: background 0.15s;
  }
  .mode-btn:active { background: rgba(255,255,255,0.07); }
  .mode-btn:disabled { opacity: 0.35; cursor: default; }
  .mode-btn .icon { font-size: 22px; width: 32px; text-align: center; }
  .mode-btn .btn-text { flex: 1; }
  .mode-btn .btn-label { color: #e8d5b0; font-size: 16px; }
  .mode-btn .btn-sub { color: #7a6a50; font-size: 12px; margin-top: 2px; }
  .mode-btn .arrow { color: #5a4a30; font-size: 22px; }

  /* Day button */
  .day-btn {
    margin: 16px 20px 0;
    background: transparent;
    border: 1px dashed rgba(244,201,122,0.2);
    border-radius: 10px;
    color: #7a6a50;
    padding: 10px;
    font-size: 13px;
    cursor: pointer;
    font-family: Georgia, serif;
    width: calc(100% - 40px);
  }

  /* Top bar */
  .top-bar {
    display: flex;
    align-items: center;
    padding: 16px 8px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .back-btn {
    background: none;
    border: none;
    color: #f4c97a;
    font-size: 32px;
    line-height: 1;
    cursor: pointer;
    padding: 0 12px;
    font-family: serif;
  }
  .top-bar-title { flex: 1; text-align: center; color: #e8d5b0; font-size: 18px; }

  /* Tabs */
  .tabs {
    display: flex;
    margin: 16px 20px 0;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    overflow: hidden;
  }
  .tab {
    flex: 1; padding: 10px;
    background: transparent; border: none;
    color: #7a6a50; font-size: 15px; cursor: pointer;
    font-family: Georgia, serif;
  }
  .tab.active { background: rgba(244,201,122,0.12); color: #f4c97a; }

  /* Form */
  .form { padding: 16px 20px; }
  label { color: #9a8a70; font-size: 13px; display: block; margin-bottom: 6px; letter-spacing: 1px; }
  input, textarea {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 12px 14px;
    color: #e8d5b0;
    font-size: 16px;
    font-family: Georgia, serif;
    margin-bottom: 16px;
    outline: none;
    -webkit-appearance: none;
  }
  textarea { height: 160px; resize: none; }
  input.correct { border-color: #7ed99a; background: rgba(126,217,154,0.08); }
  input.wrong { border-color: #e07070; background: rgba(224,112,112,0.08); }

  /* Preview */
  .preview {
    background: rgba(244,201,122,0.05);
    border: 1px solid rgba(244,201,122,0.15);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 16px;
    font-size: 14px;
  }
  .preview-label { color: #7a6a50; font-size: 12px; margin-bottom: 6px; }
  .preview-row { color: #c8b890; margin-bottom: 2px; }
  .preview-row span { color: #f4c97a; }

  /* Primary button */
  .primary-btn {
    display: block;
    width: calc(100% - 40px);
    margin: 8px 20px;
    background: linear-gradient(135deg, #f4c97a, #d4a950);
    border: none;
    border-radius: 14px;
    padding: 16px;
    color: #1a1510;
    font-size: 17px;
    font-family: Georgia, serif;
    font-weight: bold;
    cursor: pointer;
    letter-spacing: 0.5px;
  }
  .primary-btn:active { opacity: 0.85; }

  /* Error */
  .error-msg { color: #e07070; text-align: center; font-size: 14px; margin: 0 20px 8px; }

  /* Progress */
  .progress-wrap { height: 3px; background: rgba(255,255,255,0.06); }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #f4c97a, #d4a950); transition: width 0.3s; }

  /* Exercise area */
  .exercise-area { flex: 1; display: flex; flex-direction: column; padding: 24px 20px; }
  .hint { text-align: center; color: #9a8a70; font-size: 13px; margin-bottom: 8px; }

  /* Card */
  .card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    min-height: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    margin-bottom: 24px;
    transition: all 0.2s;
  }
  .card.flipped { background: rgba(244,201,122,0.06); border-color: rgba(244,201,122,0.25); }
  .card-content { text-align: center; padding: 24px; }
  .card-lang { color: #7a6a50; font-size: 13px; margin-bottom: 12px; letter-spacing: 2px; }
  .card-word { color: #e8d5b0; font-size: 34px; line-height: 1.2; }

  /* Rating */
  .rating-row { display: flex; gap: 12px; margin-top: 8px; }
  .rating-btn {
    flex: 1; padding: 16px; border: none; border-radius: 14px;
    font-size: 16px; font-family: Georgia, serif; cursor: pointer; font-weight: bold;
  }
  .wrong-btn { background: rgba(224,112,112,0.15); color: #e07070; border: 1px solid rgba(224,112,112,0.3); }
  .correct-btn { background: rgba(126,217,154,0.15); color: #7ed99a; border: 1px solid rgba(126,217,154,0.3); }

  /* Fill prompt */
  .fill-prompt {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 24px;
    text-align: center;
    margin-bottom: 8px;
  }
  #fill-input { text-align: center; font-size: 22px; }

  /* Options grid */
  .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
  .option-btn {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px;
    padding: 18px 10px;
    color: #e8d5b0;
    font-size: 16px;
    font-family: Georgia, serif;
    cursor: pointer;
    min-height: 70px;
    transition: all 0.2s;
  }
  .option-btn.correct-opt { background: rgba(126,217,154,0.15); border-color: rgba(126,217,154,0.4); color: #7ed99a; }
  .option-btn.wrong-opt { background: rgba(224,112,112,0.15); border-color: rgba(224,112,112,0.4); color: #e07070; }

  /* Results */
  .result-box { padding: 40px 20px 20px; text-align: center; }
  .result-score { color: #f4c97a; font-size: 72px; line-height: 1; margin-bottom: 12px; }
  .result-detail { font-size: 20px; margin-bottom: 32px; }

  /* Stats */
  .stat-row {
    margin-bottom: 14px; padding: 12px 14px;
    background: rgba(255,255,255,0.03);
    border-radius: 10px; border: 1px solid rgba(255,255,255,0.06);
  }
  .stat-word { margin-bottom: 6px; font-size: 14px; }
  .stat-bar-wrap { height: 6px; background: rgba(255,255,255,0.07); border-radius: 3px; overflow: hidden; margin-bottom: 4px; }
  .stat-bar { height: 100%; border-radius: 3px; transition: width 0.5s; }
  .stat-pct { color: #7a6a50; font-size: 12px; text-align: right; }

  .wrong-row {
    padding: 10px 14px;
    background: rgba(224,112,112,0.06);
    border: 1px solid rgba(224,112,112,0.15);
    border-radius: 10px; margin-bottom: 8px; font-size: 15px;
  }
  .stats-content { padding: 0 20px 20px; }

  .hidden { display: none !important; }
  .color-gold { color: #f4c97a; }
  .color-muted { color: #9a8a70; }
  .color-green { color: #7ed99a; }
  .color-red { color: #e07070; }
</style>
</head>
<body>
<div id="app">

  <!-- HOME -->
  <div id="screen-home" class="screen active">
    <div class="header">
      <div class="day-badge" id="home-day-badge">DEN 1</div>
      <div class="title">Slovíčka</div>
      <div class="subtitle" id="home-word-count">0 slov celkem</div>
    </div>
    <div id="review-banner" class="review-banner hidden">
      <span style="font-size:20px">🔁</span>
      <span><strong id="review-count">0</strong> slovíček čeká na opakování</span>
    </div>
    <div class="section">
      <div class="section-label">PROCVIČOVÁNÍ</div>
      <button class="mode-btn" id="btn-flashcard" disabled>
        <span class="icon">🃏</span>
        <div class="btn-text"><div class="btn-label">Kartičky</div><div class="btn-sub">otočit a hodnotit</div></div>
        <span class="arrow">›</span>
      </button>
      <button class="mode-btn" id="btn-fill" disabled>
        <span class="icon">✏️</span>
        <div class="btn-text"><div class="btn-label">Doplňovačka</div><div class="btn-sub">napsat anglické slovo</div></div>
        <span class="arrow">›</span>
      </button>
      <button class="mode-btn" id="btn-drag" disabled>
        <span class="icon">🔀</span>
        <div class="btn-text"><div class="btn-label">Párování</div><div class="btn-sub">vyber správný překlad</div></div>
        <span class="arrow">›</span>
      </button>
    </div>
    <div class="section">
      <div class="section-label">OSTATNÍ</div>
      <button class="mode-btn" id="btn-add">
        <span class="icon">➕</span>
        <div class="btn-text"><div class="btn-label">Přidat slovíčka</div><div class="btn-sub">ručně nebo seznam</div></div>
        <span class="arrow">›</span>
      </button>
      <button class="mode-btn" id="btn-stats" disabled>
        <span class="icon">📊</span>
        <div class="btn-text"><div class="btn-label">Statistiky</div><div class="btn-sub">chybovost a přehled</div></div>
        <span class="arrow">›</span>
      </button>
      <button class="mode-btn" id="btn-test" disabled>
        <span class="icon">🎯</span>
        <div class="btn-text"><div class="btn-label">Test všech slov</div><div class="btn-sub">celkové shrnutí</div></div>
        <span class="arrow">›</span>
      </button>
    </div>
    <button class="day-btn" id="btn-advance-day">Posunout na den 2 →</button>
  </div>

  <!-- ADD -->
  <div id="screen-add" class="screen">
    <div class="top-bar">
      <button class="back-btn" data-back="home">‹</button>
      <div class="top-bar-title">Přidat slovíčka</div>
      <div style="width:40px"></div>
    </div>
    <div class="tabs">
      <button class="tab active" id="tab-single" onclick="switchTab('single')">Jedno</button>
      <button class="tab" id="tab-bulk" onclick="switchTab('bulk')">Seznam</button>
    </div>
    <div class="form" id="form-single">
      <label>Anglicky</label>
      <input type="text" id="input-en" placeholder="cat" autocomplete="off" autocorrect="off" autocapitalize="off">
      <label>Česky</label>
      <input type="text" id="input-cs" placeholder="kočka" autocomplete="off" autocorrect="off">
    </div>
    <div class="form hidden" id="form-bulk">
      <label>Každé slovíčko na nový řádek, formát: <strong>anglicky=česky</strong></label>
      <textarea id="input-bulk" placeholder="cat=kočka&#10;dog=pes&#10;house=dům"></textarea>
      <div id="bulk-preview" class="preview hidden"></div>
    </div>
    <div class="error-msg hidden" id="add-error"></div>
    <button class="primary-btn" id="btn-do-add">Přidat</button>
  </div>

  <!-- PRACTICE - FLASHCARD -->
  <div id="screen-flashcard" class="screen">
    <div class="top-bar">
      <button class="back-btn" data-back="home">‹</button>
      <div class="top-bar-title">Kartičky</div>
      <div style="width:40px"></div>
    </div>
    <div class="progress-wrap"><div class="progress-fill" id="fc-progress"></div></div>
    <div class="exercise-area">
      <div class="hint">Klepnutím otočíš kartičku</div>
      <div class="card" id="fc-card">
        <div class="card-content">
          <div class="card-lang" id="fc-lang">🇬🇧 EN</div>
          <div class="card-word" id="fc-word"></div>
        </div>
      </div>
      <div class="rating-row hidden" id="fc-rating">
        <button class="rating-btn wrong-btn" id="fc-wrong">✗ Nevím</button>
        <button class="rating-btn correct-btn" id="fc-correct">✓ Umím</button>
      </div>
    </div>
  </div>

  <!-- PRACTICE - FILL -->
  <div id="screen-fill" class="screen">
    <div class="top-bar">
      <button class="back-btn" data-back="home">‹</button>
      <div class="top-bar-title">Doplňovačka</div>
      <div style="width:40px"></div>
    </div>
    <div class="progress-wrap"><div class="progress-fill" id="fill-progress"></div></div>
    <div class="exercise-area">
      <div class="fill-prompt">
        <div class="card-lang">🇨🇿 Přelož do angličtiny:</div>
        <div class="card-word" id="fill-cs-word"></div>
      </div>
      <input type="text" id="fill-input" placeholder="napište anglicky..." autocomplete="off" autocorrect="off" autocapitalize="off">
      <div class="hidden" id="fill-feedback"></div>
      <button class="primary-btn" id="fill-submit-btn">Zkontrolovat</button>
      <button class="primary-btn hidden" id="fill-next-btn">Další →</button>
    </div>
  </div>

  <!-- PRACTICE - DRAG (multiple choice) -->
  <div id="screen-drag" class="screen">
    <div class="top-bar">
      <button class="back-btn" data-back="home">‹</button>
      <div class="top-bar-title">Párování</div>
      <div style="width:40px"></div>
    </div>
    <div class="progress-wrap"><div class="progress-fill" id="drag-progress"></div></div>
    <div class="exercise-area">
      <div class="fill-prompt">
        <div class="card-lang">🇬🇧 Co znamená:</div>
        <div class="card-word" id="drag-en-word"></div>
      </div>
      <div class="options-grid" id="drag-options"></div>
    </div>
  </div>

  <!-- STATS -->
  <div id="screen-stats" class="screen">
    <div class="top-bar">
      <button class="back-btn" data-back="home">‹</button>
      <div class="top-bar-title">Statistiky</div>
      <div style="width:40px"></div>
    </div>
    <div class="stats-content" id="stats-content"></div>
  </div>

  <!-- TEST -->
  <div id="screen-test" class="screen">
    <div class="top-bar">
      <button class="back-btn" data-back="home">‹</button>
      <div class="top-bar-title" id="test-title">Test</div>
      <div style="width:40px"></div>
    </div>
    <div class="progress-wrap"><div class="progress-fill" id="test-progress"></div></div>
    <div class="exercise-area">
      <div class="fill-prompt">
        <div class="card-lang">🇨🇿 Přelož do angličtiny:</div>
        <div class="card-word" id="test-cs-word"></div>
      </div>
      <input type="text" id="test-input" placeholder="napište anglicky..." autocomplete="off" autocorrect="off" autocapitalize="off">
      <div class="hidden" id="test-feedback"></div>
      <button class="primary-btn" id="test-submit-btn">Zkontrolovat</button>
      <button class="primary-btn hidden" id="test-next-btn">Další →</button>
    </div>
  </div>

  <!-- RESULTS -->
  <div id="screen-results" class="screen">
    <div class="top-bar">
      <button class="back-btn" data-back="home">‹</button>
      <div class="top-bar-title">Hotovo!</div>
      <div style="width:40px"></div>
    </div>
    <div class="result-box">
      <div class="result-score" id="res-score">0%</div>
      <div class="result-detail" id="res-detail"></div>
      <button class="primary-btn" onclick="showScreen('home'); updateHome();">Zpět domů</button>
    </div>
    <div class="stats-content" id="res-wrong-list"></div>
  </div>

</div>

<script>
// ── State ────────────────────────────────────────────────────────────────────
const STORAGE_KEY = 'vocab_app_v1';

function freshState() {
  return { words: [], currentDay: 1, nextId: 1 };
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : freshState();
  } catch { return freshState(); }
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

let state = loadState();

// ── Helpers ───────────────────────────────────────────────────────────────────
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function shouldReview(word) {
  if (!word.nextReviewDay) return true;
  return state.currentDay >= word.nextReviewDay;
}

function updateInterval(word, correct) {
  word.stats.seen = (word.stats.seen || 0) + 1;
  if (correct) word.stats.correct = (word.stats.correct || 0) + 1;
  const accuracy = word.stats.correct / word.stats.seen;
  let interval = word.interval || 1;
  if (correct) {
    interval = Math.round(interval * (1.2 + accuracy));
  } else {
    interval = 1;
  }
  word.interval = interval;
  word.nextReviewDay = state.currentDay + interval;
  saveState();
}

function getReviewWords() {
  return state.words.filter(w => shouldReview(w));
}

// ── Screen management ─────────────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
  window.scrollTo(0, 0);
}

// ── Home ──────────────────────────────────────────────────────────────────────
function updateHome() {
  const { words, currentDay } = state;
  document.getElementById('home-day-badge').textContent = 'DEN ' + currentDay;
  document.getElementById('home-word-count').textContent = words.length + ' slov celkem';
  document.getElementById('btn-advance-day').textContent = 'Posunout na den ' + (currentDay + 1) + ' →';

  const review = getReviewWords();
  const banner = document.getElementById('review-banner');
  if (review.length > 0) {
    banner.classList.remove('hidden');
    document.getElementById('review-count').textContent = review.length;
  } else {
    banner.classList.add('hidden');
  }

  const hasWords = words.length > 0;
  ['btn-flashcard','btn-fill','btn-drag','btn-stats'].forEach(id => {
    document.getElementById(id).disabled = !hasWords;
  });
  document.getElementById('btn-test').disabled = words.length < 2;
}

document.getElementById('btn-add').onclick = () => { showScreen('add'); resetAddForm(); };
document.getElementById('btn-flashcard').onclick = () => startPractice('flashcard');
document.getElementById('btn-fill').onclick = () => startPractice('fill');
document.getElementById('btn-drag').onclick = () => startPractice('drag');
document.getElementById('btn-stats').onclick = () => { showScreen('stats'); renderStats(); };
document.getElementById('btn-test').onclick = () => startTest();
document.getElementById('btn-advance-day').onclick = () => {
  state.currentDay++;
  saveState();
  updateHome();
};

// Back buttons
document.querySelectorAll('.back-btn').forEach(btn => {
  btn.onclick = () => { showScreen(btn.dataset.back); updateHome(); };
});

// ── Add ───────────────────────────────────────────────────────────────────────
let addTab = 'single';

function switchTab(tab) {
  addTab = tab;
  document.getElementById('form-single').classList.toggle('hidden', tab !== 'single');
  document.getElementById('form-bulk').classList.toggle('hidden', tab !== 'bulk');
  document.getElementById('tab-single').classList.toggle('active', tab === 'single');
  document.getElementById('tab-bulk').classList.toggle('active', tab === 'bulk');
  document.getElementById('add-error').classList.add('hidden');
}

function resetAddForm() {
  document.getElementById('input-en').value = '';
  document.getElementById('input-cs').value = '';
  document.getElementById('input-bulk').value = '';
  document.getElementById('bulk-preview').classList.add('hidden');
  document.getElementById('add-error').classList.add('hidden');
  switchTab('single');
}

function parseBulk(text) {
  return text.split('\n').map(line => {
    const parts = line.split(/[=\-,|]/).map(s => s.trim());
    if (parts.length >= 2 && parts[0] && parts[1]) return { en: parts[0], cs: parts[1] };
    return null;
  }).filter(Boolean);
}

document.getElementById('input-bulk').addEventListener('input', function() {
  const parsed = parseBulk(this.value);
  const preview = document.getElementById('bulk-preview');
  if (parsed.length === 0) { preview.classList.add('hidden'); return; }
  preview.classList.remove('hidden');
  const shown = parsed.slice(0, 5);
  preview.innerHTML = '<div class="preview-label">Náhled (' + parsed.length + ' slov):</div>'
    + shown.map(w => `<div class="preview-row"><span>${w.en}</span> = ${w.cs}</div>`).join('')
    + (parsed.length > 5 ? `<div class="preview-label">... a ${parsed.length - 5} dalších</div>` : '');
});

document.getElementById('btn-do-add').onclick = () => {
  const err = document.getElementById('add-error');
  err.classList.add('hidden');

  let toAdd = [];
  if (addTab === 'single') {
    const en = document.getElementById('input-en').value.trim();
    const cs = document.getElementById('input-cs').value.trim();
    if (!en || !cs) { err.textContent = 'Vyplň obě pole.'; err.classList.remove('hidden'); return; }
    toAdd = [{ en, cs }];
  } else {
    toAdd = parseBulk(document.getElementById('input-bulk').value);
    if (toAdd.length === 0) { err.textContent = 'Žádná validní slovíčka. Formát: cat=kočka'; err.classList.remove('hidden'); return; }
  }

  let id = state.nextId;
  toAdd.forEach(w => {
    state.words.push({
      id: id++,
      en: w.en, cs: w.cs,
      addedDay: state.currentDay,
      interval: 1,
      nextReviewDay: state.currentDay + 1,
      stats: { seen: 0, correct: 0 }
    });
  });
  state.nextId = id;
  saveState();
  showScreen('home');
  updateHome();
};

// ── Practice ──────────────────────────────────────────────────────────────────
let practiceQueue = [];
let practiceIdx = 0;
let practiceResults = { correct: 0, wrong: 0 };
let practiceMode = 'flashcard';

function startPractice(mode) {
  practiceMode = mode;
  const review = getReviewWords();
  practiceQueue = shuffle(review.length > 0 ? review : state.words);
  practiceIdx = 0;
  practiceResults = { correct: 0, wrong: 0 };
  showScreen(mode);
  renderPracticeStep();
}

function renderPracticeStep() {
  const total = practiceQueue.length;
  const pct = (practiceIdx / total * 100) + '%';

  if (practiceMode === 'flashcard') {
    document.getElementById('fc-progress').style.width = pct;
    const word = practiceQueue[practiceIdx];
    const card = document.getElementById('fc-card');
    card.classList.remove('flipped');
    document.getElementById('fc-lang').textContent = '🇬🇧 EN';
    document.getElementById('fc-word').textContent = word.en;
    document.getElementById('fc-rating').classList.add('hidden');

    card.onclick = () => {
      if (card.classList.contains('flipped')) return;
      card.classList.add('flipped');
      document.getElementById('fc-lang').textContent = '🇨🇿 CS';
      document.getElementById('fc-word').textContent = word.cs;
      document.getElementById('fc-rating').classList.remove('hidden');
    };
  } else if (practiceMode === 'fill') {
    document.getElementById('fill-progress').style.width = pct;
    const word = practiceQueue[practiceIdx];
    document.getElementById('fill-cs-word').textContent = word.cs;
    const inp = document.getElementById('fill-input');
    inp.value = '';
    inp.className = '';
    inp.disabled = false;
    document.getElementById('fill-feedback').classList.add('hidden');
    document.getElementById('fill-submit-btn').classList.remove('hidden');
    document.getElementById('fill-next-btn').classList.add('hidden');
    setTimeout(() => inp.focus(), 100);
  } else if (practiceMode === 'drag') {
    document.getElementById('drag-progress').style.width = pct;
    const word = practiceQueue[practiceIdx];
    document.getElementById('drag-en-word').textContent = word.en;
    const pool = state.words.filter(w => w.id !== word.id);
    const distractors = shuffle(pool).slice(0, 3);
    const options = shuffle([word, ...distractors]);
    const grid = document.getElementById('drag-options');
    grid.innerHTML = '';
    options.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.textContent = opt.cs;
      btn.onclick = () => {
        if (btn.disabled) return;
        grid.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
        const correct = opt.id === word.id;
        btn.classList.add(correct ? 'correct-opt' : 'wrong-opt');
        if (!correct) {
          grid.querySelectorAll('.option-btn').forEach(b => {
            if (b.textContent === word.cs) b.classList.add('correct-opt');
          });
        }
        practiceRecord(correct);
        setTimeout(() => nextPracticeStep(), 900);
      };
      grid.appendChild(btn);
    });
  }
}

function practiceRecord(correct) {
  const word = practiceQueue[practiceIdx];
  updateInterval(word, correct);
  if (correct) practiceResults.correct++; else practiceResults.wrong++;
}

function nextPracticeStep() {
  practiceIdx++;
  if (practiceIdx >= practiceQueue.length) {
    showResults(practiceResults.correct, practiceResults.wrong, practiceQueue.length, []);
  } else {
    renderPracticeStep();
  }
}

// Fill submit
document.getElementById('fill-submit-btn').onclick = () => submitFill(false);
document.getElementById('fill-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitFill(false);
});
document.getElementById('fill-next-btn').onclick = () => nextPracticeStep();

function submitFill(isTest) {
  const word = isTest ? testQueue[testIdx] : practiceQueue[practiceIdx];
  const inp = document.getElementById(isTest ? 'test-input' : 'fill-input');
  const val = inp.value.trim();
  if (!val) return;
  const correct = val.toLowerCase() === word.en.toLowerCase();
  inp.classList.add(correct ? 'correct' : 'wrong');
  inp.disabled = true;

  const fb = document.getElementById(isTest ? 'test-feedback' : 'fill-feedback');
  fb.classList.remove('hidden');
  fb.innerHTML = correct
    ? '<div style="color:#7ed99a;font-size:18px;text-align:center;margin-bottom:8px">✓ Správně!</div>'
    : `<div style="color:#e07070;text-align:center;margin-bottom:8px">✗ Správně: <strong style="color:#f4c97a">${word.en}</strong></div>`;

  if (isTest) {
    testRecord(correct);
    document.getElementById('test-submit-btn').classList.add('hidden');
    document.getElementById('test-next-btn').classList.remove('hidden');
  } else {
    practiceRecord(correct);
    document.getElementById('fill-submit-btn').classList.add('hidden');
    document.getElementById('fill-next-btn').classList.remove('hidden');
  }
}

// FC rating
document.getElementById('fc-wrong').onclick = () => { practiceRecord(false); nextPracticeStep(); };
document.getElementById('fc-correct').onclick = () => { practiceRecord(true); nextPracticeStep(); };

// ── Test ──────────────────────────────────────────────────────────────────────
let testQueue = [];
let testIdx = 0;
let testResults = [];

function startTest() {
  testQueue = shuffle(state.words);
  testIdx = 0;
  testResults = [];
  showScreen('test');
  renderTestStep();
}

function renderTestStep() {
  const total = testQueue.length;
  document.getElementById('test-title').textContent = `Test (${testIdx + 1}/${total})`;
  document.getElementById('test-progress').style.width = (testIdx / total * 100) + '%';
  const word = testQueue[testIdx];
  document.getElementById('test-cs-word').textContent = word.cs;
  const inp = document.getElementById('test-input');
  inp.value = ''; inp.className = ''; inp.disabled = false;
  document.getElementById('test-feedback').classList.add('hidden');
  document.getElementById('test-submit-btn').classList.remove('hidden');
  document.getElementById('test-next-btn').classList.add('hidden');
  setTimeout(() => inp.focus(), 100);
}

document.getElementById('test-submit-btn').onclick = () => submitFill(true);
document.getElementById('test-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitFill(true);
});
document.getElementById('test-next-btn').onclick = () => {
  testIdx++;
  if (testIdx >= testQueue.length) {
    const correct = testResults.filter(r => r.correct).length;
    const wrong = testResults.filter(r => !r.correct);
    showResults(correct, testResults.length - correct, testResults.length, wrong);
  } else {
    renderTestStep();
  }
};

function testRecord(correct) {
  const word = testQueue[testIdx];
  updateInterval(word, correct);
  testResults.push({ word, correct });
}

// ── Results ───────────────────────────────────────────────────────────────────
function showResults(correct, wrong, total, wrongWords) {
  const pct = Math.round(correct / total * 100);
  document.getElementById('res-score').textContent = pct + '%';
  document.getElementById('res-detail').innerHTML =
    `<span class="color-green">✓ ${correct}</span>  <span class="color-red">✗ ${wrong}</span>  <span class="color-muted">/ ${total}</span>`;

  const list = document.getElementById('res-wrong-list');
  if (wrongWords.length > 0) {
    list.innerHTML = '<div class="section-label" style="padding:16px 20px 8px">ŠPATNĚ ZODPOVĚZENÁ</div>'
      + wrongWords.map(r => `<div class="wrong-row" style="margin:0 20px 8px"><span class="color-gold">${r.word.en}</span> <span class="color-muted">=</span> ${r.word.cs}</div>`).join('');
  } else {
    list.innerHTML = '<div style="color:#7ed99a;text-align:center;padding:16px">Žádné chyby! 🎉</div>';
  }

  showScreen('results');
}

// ── Stats ─────────────────────────────────────────────────────────────────────
function renderStats() {
  const sorted = [...state.words]
    .filter(w => w.stats.seen > 0)
    .sort((a, b) => (a.stats.correct / a.stats.seen) - (b.stats.correct / b.stats.seen));

  const el = document.getElementById('stats-content');
  if (sorted.length === 0) {
    el.innerHTML = '<div style="color:#9a8a70;text-align:center;padding:40px">Zatím žádná data. Procvičuj!</div>';
    return;
  }
  el.innerHTML = '<div class="section-label" style="padding:16px 20px 8px">NEJPROBLEMATIČTĚJŠÍ SLOVA</div>'
    + sorted.map(w => {
      const pct = Math.round(w.stats.correct / w.stats.seen * 100);
      const color = pct < 50 ? '#e07070' : pct < 80 ? '#f4c97a' : '#7ed99a';
      return `<div class="stat-row" style="margin:0 20px 10px">
        <div class="stat-word"><span class="color-gold">${w.en}</span> <span class="color-muted">= ${w.cs}</span></div>
        <div class="stat-bar-wrap"><div class="stat-bar" style="width:${pct}%;background:${color}"></div></div>
        <div class="stat-pct">${pct}%</div>
      </div>`;
    }).join('');
}

// ── Init ──────────────────────────────────────────────────────────────────────
updateHome();
</script>
